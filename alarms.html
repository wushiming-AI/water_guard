<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>预警记录 - 水域溺水防控AI预警系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { background: #0c1929; color: #c8d8e8; font-family: 'Microsoft YaHei', Arial, sans-serif; min-height: 100vh; }
    .sidebar { width:220px; min-height:100vh; background:rgba(13,33,55,0.95); border-right:1px solid rgba(52,152,219,0.2); position:fixed; top:0; left:0; z-index:100; display:flex; flex-direction:column; }
    .sidebar-brand { padding:20px 16px; border-bottom:1px solid rgba(52,152,219,0.2); display:flex; align-items:center; gap:10px; }
    .sidebar-brand .icon { width:36px; height:36px; border-radius:8px; background:linear-gradient(135deg,#1a6fa8,#3498db); display:flex; align-items:center; justify-content:center; }
    .sidebar-brand .icon i { color:#fff; font-size:18px; }
    .sidebar-brand span { font-size:14px; font-weight:700; color:#e0e8f0; line-height:1.3; }
    .nav-item a { display:flex; align-items:center; gap:10px; padding:12px 20px; color:rgba(200,216,232,0.6); text-decoration:none; font-size:14px; transition:all 0.2s; border-left:3px solid transparent; }
    .nav-item a:hover, .nav-item a.active { color:#3498db; background:rgba(52,152,219,0.1); border-left-color:#3498db; }
    .nav-item a i { width:18px; text-align:center; }
    .sidebar-footer { margin-top:auto; padding:16px 20px; border-top:1px solid rgba(52,152,219,0.15); font-size:12px; color:rgba(200,216,232,0.4); }
    .sidebar-footer .user-info { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .sidebar-footer .avatar { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#1a6fa8,#3498db); display:flex; align-items:center; justify-content:center; }
    .sidebar-footer .avatar i { font-size:13px; color:#fff; }
    .btn-logout { background:none; border:none; color:rgba(200,216,232,0.4); font-size:12px; cursor:pointer; padding:0; }
    .btn-logout:hover { color:#ff6b6b; }

    .main-content { margin-left:220px; padding:24px; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
    .page-header h2 { font-size:20px; font-weight:700; color:#e0e8f0; }

    .filter-bar {
      background:rgba(255,255,255,0.03); border:1px solid rgba(52,152,219,0.2);
      border-radius:12px; padding:16px 20px; margin-bottom:20px;
      display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    }
    .filter-bar label { font-size:13px; color:rgba(200,216,232,0.6); white-space:nowrap; }
    .filter-input {
      background:rgba(255,255,255,0.06); border:1px solid rgba(52,152,219,0.3);
      color:#e0e8f0; border-radius:8px; padding:6px 12px; font-size:13px;
    }
    .filter-input:focus { outline:none; border-color:#3498db; }
    .btn-filter {
      padding:6px 18px; background:linear-gradient(135deg,#1a6fa8,#3498db);
      border:none; border-radius:8px; color:#fff; font-size:13px; cursor:pointer;
      transition:opacity 0.2s;
    }
    .btn-filter:hover { opacity:0.85; }
    .btn-reset {
      padding:6px 14px; background:rgba(255,255,255,0.06);
      border:1px solid rgba(52,152,219,0.3); border-radius:8px;
      color:rgba(200,216,232,0.7); font-size:13px; cursor:pointer;
    }
    .btn-reset:hover { border-color:#3498db; color:#3498db; }

    .panel { background:rgba(255,255,255,0.03); border:1px solid rgba(52,152,219,0.2); border-radius:12px; overflow:hidden; }
    .panel-header { padding:14px 20px; border-bottom:1px solid rgba(52,152,219,0.15); display:flex; align-items:center; justify-content:space-between; }
    .panel-header h3 { font-size:15px; font-weight:600; color:#e0e8f0; margin:0; }

    table { width:100%; border-collapse:collapse; }
    thead th { padding:12px 16px; font-size:12px; color:rgba(200,216,232,0.5); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid rgba(52,152,219,0.15); background:rgba(52,152,219,0.05); }
    tbody td { padding:12px 16px; font-size:13px; color:#c8d8e8; border-bottom:1px solid rgba(52,152,219,0.08); }
    tbody tr:hover td { background:rgba(52,152,219,0.05); }
    .badge-level { padding:3px 10px; border-radius:10px; font-size:11px; font-weight:600; }
    .badge-level.urgent { background:rgba(231,76,60,0.2); color:#ff6b6b; border:1px solid rgba(231,76,60,0.3); }
    .badge-level.warning { background:rgba(243,156,18,0.2); color:#f1c40f; border:1px solid rgba(243,156,18,0.3); }
    .badge-level.info { background:rgba(52,152,219,0.2); color:#74b9ff; border:1px solid rgba(52,152,219,0.3); }
    .badge-status { padding:3px 10px; border-radius:10px; font-size:11px; }
    .badge-status.unread { background:rgba(231,76,60,0.15); color:#ff6b6b; }
    .badge-status.read { background:rgba(39,174,96,0.15); color:#55efc4; }

    .loading-row td { text-align:center; padding:40px; color:rgba(200,216,232,0.4); }
    .spinner-border-sm { width:1rem; height:1rem; }
    .empty-row td { text-align:center; padding:40px; color:rgba(200,216,232,0.3); font-size:14px; }

    .pagination-bar { padding:12px 20px; border-top:1px solid rgba(52,152,219,0.1); display:flex; align-items:center; justify-content:space-between; }
    .pagination-bar .total { font-size:13px; color:rgba(200,216,232,0.4); }
    .page-btns { display:flex; gap:6px; }
    .page-btns button { padding:4px 12px; border-radius:6px; font-size:13px; cursor:pointer; transition:all 0.2s; }
    .page-btns .btn-page { background:rgba(255,255,255,0.05); border:1px solid rgba(52,152,219,0.3); color:rgba(200,216,232,0.7); }
    .page-btns .btn-page:hover { border-color:#3498db; color:#3498db; }
    .page-btns .btn-page.active { background:#3498db; border-color:#3498db; color:#fff; }
    .page-btns .btn-page:disabled { opacity:0.3; cursor:default; }

    /* ── 手机端适配 ── */
    .mobile-header { display:none; position:fixed; top:0; left:0; right:0; height:50px; background:rgba(13,33,55,0.98); border-bottom:1px solid rgba(52,152,219,0.2); z-index:200; align-items:center; padding:0 12px; }
    .mobile-header .menu-btn { background:none; border:none; color:#3498db; font-size:22px; cursor:pointer; padding:4px 8px; }
    .mobile-header .title { flex:1; text-align:center; font-size:14px; font-weight:600; color:#e0e8f0; }
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; }
    .sidebar-overlay.active { display:block; }
    @media (max-width:768px) {
      .mobile-header { display:flex; }
      .sidebar { transform:translateX(-100%); transition:transform 0.3s ease; z-index:300; }
      .sidebar.open { transform:translateX(0); }
      .main-content { margin-left:0; padding:60px 12px 16px; }
      .filter-bar { flex-direction:column; align-items:stretch; }
      table { font-size:12px; }
      thead th, tbody td { padding:8px 10px; }
      .page-header h2 { font-size:17px; }
    }
  </style>
</head>
<body>

<!-- 手机端顶栏 -->
<div class="mobile-header">
  <button class="menu-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
  <span class="title">预警记录</span>
  <span style="width:38px"></span>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="sidebar">
  <div class="sidebar-brand">
    <div class="icon"><i class="bi bi-shield-check"></i></div>
    <span>水域溺水<br/>防控AI系统</span>
  </div>
  <nav class="mt-2">
    <div class="nav-item"><a href="dashboard.html"><i class="bi bi-display"></i>监控大屏</a></div>
    <div class="nav-item"><a href="alarms.html" class="active"><i class="bi bi-bell"></i>预警记录</a></div>
    <div class="nav-item"><a href="devices.html"><i class="bi bi-camera-video"></i>设备管理</a></div>
    <div class="nav-item"><a href="users.html"><i class="bi bi-people"></i>用户管理</a></div>
    <div class="nav-item"><a href="settings.html"><i class="bi bi-gear"></i>系统设置</a></div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="avatar"><i class="bi bi-person"></i></div>
      <span id="sidebarUser">管理员</span>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-left me-1"></i>退出登录</button>
  </div>
</div>

<div class="main-content">
  <div class="page-header">
    <h2><i class="bi bi-bell me-2 text-primary"></i>预警记录</h2>
  </div>

  <!-- 筛选栏 -->
  <div class="filter-bar">
    <label>日期筛选：</label>
    <input type="date" class="filter-input" id="filterDate" />
    <label>级别筛选：</label>
    <select class="filter-input" id="filterLevel">
      <option value="">全部</option>
      <option value="urgent">紧急（溺水）</option>
      <option value="info">记录（游泳/戏水）</option>
    </select>
    <button class="btn-filter" onclick="applyFilter()"><i class="bi bi-search me-1"></i>查询</button>
    <button class="btn-reset" onclick="resetFilter()"><i class="bi bi-arrow-counterclockwise me-1"></i>重置</button>
    <span id="filterResult" style="font-size:13px;color:rgba(200,216,232,0.4);margin-left:8px;"></span>
  </div>

  <!-- 表格 -->
  <div class="panel">
    <div class="panel-header">
      <h3><i class="bi bi-list-ul me-2"></i>预警列表</h3>
      <button class="btn-filter" onclick="loadAlarms(currentDate)"><i class="bi bi-arrow-clockwise me-1"></i>刷新</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>报警时间</th>
          <th>位置</th>
          <th>描述</th>
          <th>级别</th>
          <th>状态</th>
        </tr>
      </thead>
      <tbody id="alarmTableBody">
        <tr class="loading-row"><td colspan="6"><span class="spinner-border spinner-border-sm me-2"></span>加载中...</td></tr>
      </tbody>
    </table>
    <div class="pagination-bar">
      <span class="total" id="totalText">共 0 条</span>
      <div class="page-btns" id="pageBtns"></div>
    </div>
  </div>
</div>

<script>
  const API_BASE = localStorage.getItem('api_base') || 'https://gills-register-prescribe.ngrok-free.dev';
  const PAGE_SIZE = 20;
  let allAlarms = [];
  let currentPage = 1;
  let currentDate = '';
  let currentLevel = '';

  function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('active');
  }

  (function checkAuth() {
    const u = localStorage.getItem('waterGuardUser') || sessionStorage.getItem('waterGuardUser');
    if (!u) { window.location.href = 'index.html'; return; }
    try {
      const user = JSON.parse(u);
      document.getElementById('sidebarUser').textContent = user.nickname || user.phone || '管理员';
      if (user.role !== 'admin') {
        const usersNav = document.querySelector('a[href="users.html"]');
        if (usersNav) usersNav.parentElement.style.display = 'none';
      }
    } catch(_) {}
  })();

  function logout() {
    localStorage.removeItem('waterGuardUser'); sessionStorage.removeItem('waterGuardUser');
    window.location.href = 'index.html';
  }

  async function loadAlarms(dateStr, levelStr) {
    document.getElementById('alarmTableBody').innerHTML =
      '<tr class="loading-row"><td colspan="6"><span class="spinner-border spinner-border-sm me-2"></span>加载中...</td></tr>';
    try {
      let url = `${API_BASE}/alarms`;
      const params = [];
      if (dateStr) params.push(`date_str=${dateStr}`);
      if (levelStr) params.push(`level=${levelStr}`);
      if (params.length > 0) url += '?' + params.join('&');
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('请求失败');
      const data = await resp.json();
      allAlarms = Array.isArray(data) ? data : [];
      currentPage = 1;
      renderTable();
      document.getElementById('filterResult').textContent = `共找到 ${allAlarms.length} 条记录`;
    } catch(e) {
      document.getElementById('alarmTableBody').innerHTML =
        '<tr class="empty-row"><td colspan="6"><i class="bi bi-wifi-off me-2"></i>加载失败，请检查后端服务</td></tr>';
    }
  }

  function renderTable() {
    const tbody = document.getElementById('alarmTableBody');
    const start = (currentPage - 1) * PAGE_SIZE;
    const page = allAlarms.slice(start, start + PAGE_SIZE);
    document.getElementById('totalText').textContent = `共 ${allAlarms.length} 条`;

    if (page.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6"><i class="bi bi-inbox me-2"></i>暂无预警记录</td></tr>';
      document.getElementById('pageBtns').innerHTML = '';
      return;
    }

    tbody.innerHTML = page.map(a => `
      <tr>
        <td>${a.id}</td>
        <td>${a.time || '--'}</td>
        <td><i class="bi bi-geo-alt me-1 text-primary"></i>${a.location || '--'}</td>
        <td>${a.message || '--'}</td>
        <td><span class="badge-level ${a.level || 'warning'}">${levelLabel(a.level)}</span></td>
        <td><span class="badge-status ${a.status || 'unread'}">${a.status === 'read' ? '已读' : '未读'}</span></td>
      </tr>
    `).join('');

    // 分页按钮
    const totalPages = Math.ceil(allAlarms.length / PAGE_SIZE);
    let btnHtml = `<button class="btn-page" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    for (let i = 1; i <= totalPages; i++) {
      if (totalPages > 7 && i > 3 && i < totalPages - 1 && Math.abs(i - currentPage) > 1) {
        if (i === 4) btnHtml += '<button class="btn-page" disabled>…</button>';
        continue;
      }
      btnHtml += `<button class="btn-page ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    }
    btnHtml += `<button class="btn-page" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
    document.getElementById('pageBtns').innerHTML = btnHtml;
  }

  function goPage(p) {
    const totalPages = Math.ceil(allAlarms.length / PAGE_SIZE);
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    renderTable();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function levelLabel(l) {
    return l === 'urgent' ? '紧急' : l === 'warning' ? '警告' : '记录';
  }

  function applyFilter() {
    currentDate = document.getElementById('filterDate').value;
    currentLevel = document.getElementById('filterLevel').value;
    loadAlarms(currentDate, currentLevel);
  }

  function resetFilter() {
    document.getElementById('filterDate').value = '';
    document.getElementById('filterLevel').value = '';
    currentDate = '';
    currentLevel = '';
    document.getElementById('filterResult').textContent = '';
    loadAlarms('', '');
  }

  loadAlarms('', '');
</script>
</body>
</html>
