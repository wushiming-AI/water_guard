<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>设备管理 - 水域溺水防控AI预警系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { background:#0c1929; color:#c8d8e8; font-family:'Microsoft YaHei',Arial,sans-serif; min-height:100vh; }
    .sidebar { width:220px; min-height:100vh; background:rgba(13,33,55,0.95); border-right:1px solid rgba(52,152,219,0.2); position:fixed; top:0; left:0; z-index:100; display:flex; flex-direction:column; }
    .sidebar-brand { padding:20px 16px; border-bottom:1px solid rgba(52,152,219,0.2); display:flex; align-items:center; gap:10px; }
    .sidebar-brand .icon { width:36px; height:36px; border-radius:8px; background:linear-gradient(135deg,#1a6fa8,#3498db); display:flex; align-items:center; justify-content:center; }
    .sidebar-brand .icon i { color:#fff; font-size:18px; }
    .sidebar-brand span { font-size:14px; font-weight:700; color:#e0e8f0; line-height:1.3; }
    .nav-item a { display:flex; align-items:center; gap:10px; padding:12px 20px; color:rgba(200,216,232,0.6); text-decoration:none; font-size:14px; transition:all 0.2s; border-left:3px solid transparent; }
    .nav-item a:hover, .nav-item a.active { color:#3498db; background:rgba(52,152,219,0.1); border-left-color:#3498db; }
    .nav-item a i { width:18px; text-align:center; }
    .sidebar-footer { margin-top:auto; padding:16px 20px; border-top:1px solid rgba(52,152,219,0.15); font-size:12px; color:rgba(200,216,232,0.4); }
    .sidebar-footer .user-info { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .sidebar-footer .avatar { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#1a6fa8,#3498db); display:flex; align-items:center; justify-content:center; }
    .sidebar-footer .avatar i { font-size:13px; color:#fff; }
    .btn-logout { background:none; border:none; color:rgba(200,216,232,0.4); font-size:12px; cursor:pointer; padding:0; }
    .btn-logout:hover { color:#ff6b6b; }

    .main-content { margin-left:220px; padding:24px; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
    .page-header h2 { font-size:20px; font-weight:700; color:#e0e8f0; }
    .btn-add {
      padding:8px 20px; background:linear-gradient(135deg,#1a6fa8,#3498db);
      border:none; border-radius:8px; color:#fff; font-size:14px; cursor:pointer;
      transition:opacity 0.2s;
    }
    .btn-add:hover { opacity:0.85; }

    /* 添加设备面板 */
    .add-panel {
      background:rgba(255,255,255,0.04); border:1px solid rgba(52,152,219,0.3);
      border-radius:12px; padding:24px; margin-bottom:24px; display:none;
    }
    .add-panel h4 { font-size:15px; font-weight:600; color:#e0e8f0; margin-bottom:16px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .form-group label { font-size:13px; color:rgba(200,216,232,0.6); margin-bottom:6px; display:block; }
    .form-control-dark {
      width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(52,152,219,0.3);
      color:#e0e8f0; border-radius:8px; padding:8px 12px; font-size:13px;
    }
    .form-control-dark:focus { outline:none; border-color:#3498db; }
    .form-control-dark option { background:#0d2137; }
    .form-actions { margin-top:16px; display:flex; gap:10px; }
    .btn-save { padding:8px 20px; background:linear-gradient(135deg,#1a6fa8,#3498db); border:none; border-radius:8px; color:#fff; font-size:13px; cursor:pointer; }
    .btn-cancel { padding:8px 20px; background:rgba(255,255,255,0.06); border:1px solid rgba(52,152,219,0.3); border-radius:8px; color:rgba(200,216,232,0.7); font-size:13px; cursor:pointer; }

    /* 设备网格 */
    .devices-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }
    .device-card {
      background:rgba(255,255,255,0.04); border:1px solid rgba(52,152,219,0.2);
      border-radius:12px; padding:20px; transition:border-color 0.2s;
      position:relative;
    }
    .device-card:hover { border-color:rgba(52,152,219,0.5); }
    .device-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .device-icon-wrap { width:44px; height:44px; border-radius:10px; background:linear-gradient(135deg,#1a6fa8,#3498db); display:flex; align-items:center; justify-content:center; }
    .device-icon-wrap i { font-size:20px; color:#fff; }
    .device-status { display:flex; align-items:center; gap:6px; font-size:12px; }
    .status-dot { width:8px; height:8px; border-radius:50%; }
    .status-dot.online { background:#27ae60; box-shadow:0 0 6px rgba(39,174,96,0.8); }
    .status-dot.offline { background:#e74c3c; }
    .status-label.online { color:#27ae60; }
    .status-label.offline { color:#e74c3c; }
    .device-name { font-size:15px; font-weight:600; color:#e0e8f0; margin-bottom:8px; }
    .device-info { font-size:12px; color:rgba(200,216,232,0.5); line-height:1.8; }
    .device-info i { width:14px; }
    .device-actions { margin-top:14px; display:flex; gap:8px; }
    .btn-del { padding:5px 14px; background:rgba(231,76,60,0.15); border:1px solid rgba(231,76,60,0.3); border-radius:6px; color:#ff6b6b; font-size:12px; cursor:pointer; transition:all 0.2s; }
    .btn-del:hover { background:rgba(231,76,60,0.3); }
    .btn-edit { padding:5px 14px; background:rgba(52,152,219,0.1); border:1px solid rgba(52,152,219,0.3); border-radius:6px; color:#74b9ff; font-size:12px; cursor:pointer; }

    .loading-wrap { text-align:center; padding:60px; color:rgba(200,216,232,0.4); }
    .empty-wrap { text-align:center; padding:60px; color:rgba(200,216,232,0.3); font-size:14px; }

    /* 提示框 */
    .toast-wrap { position:fixed; top:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
    .toast-item { padding:12px 20px; border-radius:8px; font-size:13px; animation:slideIn 0.3s ease; }
    .toast-item.success { background:rgba(39,174,96,0.9); color:#fff; }
    .toast-item.error { background:rgba(231,76,60,0.9); color:#fff; }
    @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

    .mobile-header { display:none; position:fixed; top:0; left:0; right:0; height:50px; background:rgba(13,33,55,0.98); border-bottom:1px solid rgba(52,152,219,0.2); z-index:200; align-items:center; padding:0 12px; }
    .mobile-header .menu-btn { background:none; border:none; color:#3498db; font-size:22px; cursor:pointer; padding:4px 8px; }
    .mobile-header .title { flex:1; text-align:center; font-size:14px; font-weight:600; color:#e0e8f0; }
    .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99; }
    .sidebar-overlay.active { display:block; }
    @media (max-width:768px) {
      .mobile-header { display:flex; }
      .sidebar { transform:translateX(-100%); transition:transform 0.3s ease; z-index:300; }
      .sidebar.open { transform:translateX(0); }
      .main-content { margin-left:0; padding:60px 12px 16px; }
      .page-header h2 { font-size:17px; }
      table { font-size:12px; }
      thead th, tbody td { padding:8px 10px; }
    }
  </style>
</head>
<body>

<div class="mobile-header">
  <button class="menu-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
  <span class="title">设备管理</span>
  <span style="width:38px"></span>
</div>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="sidebar">
  <div class="sidebar-brand">
    <div class="icon"><i class="bi bi-shield-check"></i></div>
    <span>水域溺水<br/>防控AI系统</span>
  </div>
  <nav class="mt-2">
    <div class="nav-item"><a href="dashboard.html"><i class="bi bi-display"></i>监控大屏</a></div>
    <div class="nav-item"><a href="alarms.html"><i class="bi bi-bell"></i>预警记录</a></div>
    <div class="nav-item"><a href="devices.html" class="active"><i class="bi bi-camera-video"></i>设备管理</a></div>
    <div class="nav-item"><a href="users.html"><i class="bi bi-people"></i>用户管理</a></div>
    <div class="nav-item"><a href="settings.html"><i class="bi bi-gear"></i>系统设置</a></div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="avatar"><i class="bi bi-person"></i></div>
      <span id="sidebarUser">管理员</span>
    </div>
    <button class="btn-logout" onclick="logout()"><i class="bi bi-box-arrow-left me-1"></i>退出登录</button>
  </div>
</div>

<div class="main-content">
  <div class="page-header">
    <h2><i class="bi bi-camera-video me-2 text-primary"></i>设备管理</h2>
    <button class="btn-add" onclick="toggleAddPanel()">
      <i class="bi bi-plus-lg me-1"></i>添加设备
    </button>
  </div>

  <!-- 添加设备面板 -->
  <div class="add-panel" id="addPanel">
    <h4><i class="bi bi-plus-circle me-2"></i>添加新设备</h4>
    <div class="form-row">
      <div class="form-group">
        <label>设备名称 *</label>
        <input type="text" class="form-control-dark" id="newName" placeholder="如：光明湖3号摄像头" />
      </div>
      <div class="form-group">
        <label>设备ID</label>
        <input type="text" class="form-control-dark" id="newDeviceId" placeholder="如：CAM-005" />
      </div>
      <div class="form-group">
        <label>安装位置</label>
        <input type="text" class="form-control-dark" id="newLocation" placeholder="如：光明湖西岸" />
      </div>
      <div class="form-group">
        <label>IP 地址</label>
        <input type="text" class="form-control-dark" id="newIp" placeholder="如：192.168.1.105" />
      </div>
      <div class="form-group">
        <label>设备状态</label>
        <select class="form-control-dark" id="newStatus">
          <option value="online">在线</option>
          <option value="offline">离线</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveDevice()"><i class="bi bi-check-lg me-1"></i>确认添加</button>
      <button class="btn-cancel" onclick="toggleAddPanel()">取消</button>
    </div>
  </div>

  <!-- 设备卡片网格 -->
  <div id="devicesContainer">
    <div class="loading-wrap">
      <span class="spinner-border spinner-border-sm me-2"></span>加载设备列表...
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
  const API_BASE = localStorage.getItem('api_base') || 'https://gills-register-prescribe.ngrok-free.dev';

  function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('active');
  }

  (function checkAuth() {
    const u = localStorage.getItem('waterGuardUser') || sessionStorage.getItem('waterGuardUser');
    if (!u) { window.location.href = 'index.html'; return; }
    try {
      const user = JSON.parse(u);
      document.getElementById('sidebarUser').textContent = user.nickname || user.phone || '管理员';
      if (user.role !== 'admin') {
        const usersNav = document.querySelector('a[href="users.html"]');
        if (usersNav) usersNav.parentElement.style.display = 'none';
      }
    } catch(_) {}
  })();
  function logout() {
    localStorage.removeItem('waterGuardUser'); sessionStorage.removeItem('waterGuardUser');
    window.location.href = 'index.html';
  }

  function showToast(msg, type) {
    const wrap = document.getElementById('toastWrap');
    const el = document.createElement('div');
    el.className = `toast-item ${type}`;
    el.innerHTML = `<i class="bi bi-${type==='success'?'check-circle':'x-circle'} me-2"></i>${msg}`;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  let addPanelVisible = false;
  function toggleAddPanel() {
    addPanelVisible = !addPanelVisible;
    document.getElementById('addPanel').style.display = addPanelVisible ? 'block' : 'none';
    if (addPanelVisible) {
      document.getElementById('newName').value = '';
      document.getElementById('newDeviceId').value = '';
      document.getElementById('newLocation').value = '';
      document.getElementById('newIp').value = '';
      document.getElementById('newStatus').value = 'online';
    }
  }

  async function loadDevices() {
    try {
      const resp = await fetch(`${API_BASE}/api/devices`);
      if (!resp.ok) throw new Error();
      const list = await resp.json();
      renderDevices(list);
    } catch(_) {
      document.getElementById('devicesContainer').innerHTML =
        '<div class="empty-wrap"><i class="bi bi-wifi-off me-2"></i>加载失败，请检查后端服务</div>';
    }
  }

  function renderDevices(list) {
    const container = document.getElementById('devicesContainer');
    if (!list || list.length === 0) {
      container.innerHTML = '<div class="empty-wrap"><i class="bi bi-inbox me-2"></i>暂无设备，请点击「添加设备」</div>';
      return;
    }
    container.innerHTML = `<div class="devices-grid">${list.map(d => deviceCard(d)).join('')}</div>`;
  }

  function deviceCard(d) {
    const isOnline = (d.status || 'offline') === 'online';
    return `
      <div class="device-card" id="device-${d.id}">
        <div class="device-card-header">
          <div class="device-icon-wrap"><i class="bi bi-camera-video-fill"></i></div>
          <div class="device-status">
            <div class="status-dot ${isOnline ? 'online' : 'offline'}"></div>
            <span class="status-label ${isOnline ? 'online' : 'offline'}">${isOnline ? '在线' : '离线'}</span>
          </div>
        </div>
        <div class="device-name">${d.name || '未命名设备'}</div>
        <div class="device-info">
          <div><i class="bi bi-tag"></i> ID：${d.device_id || '--'}</div>
          <div><i class="bi bi-geo-alt"></i> 位置：${d.location || '--'}</div>
          <div><i class="bi bi-hdd-network"></i> IP：${d.ip_address || '--'}</div>
          <div><i class="bi bi-clock"></i> 最近在线：${d.last_online ? d.last_online.substring(0,16) : '--'}</div>
        </div>
        <div class="device-actions">
          <button class="btn-del" onclick="deleteDevice(${d.id}, '${(d.name||'').replace(/'/g,'&apos;')}')">
            <i class="bi bi-trash me-1"></i>删除
          </button>
          <button class="btn-edit" onclick="toggleStatus(${d.id}, '${d.status}')">
            <i class="bi bi-arrow-repeat me-1"></i>${isOnline ? '设为离线' : '设为在线'}
          </button>
        </div>
      </div>
    `;
  }

  async function saveDevice() {
    const name = document.getElementById('newName').value.trim();
    if (!name) { showToast('请输入设备名称', 'error'); return; }
    try {
      const resp = await fetch(`${API_BASE}/api/devices`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name,
          device_id: document.getElementById('newDeviceId').value.trim() || null,
          location: document.getElementById('newLocation').value.trim() || null,
          ip_address: document.getElementById('newIp').value.trim() || null,
          status: document.getElementById('newStatus').value,
        }),
      });
      const data = await resp.json();
      if (data.success) {
        showToast('设备添加成功', 'success');
        toggleAddPanel();
        loadDevices();
      } else {
        showToast(data.detail || '添加失败', 'error');
      }
    } catch(_) {
      showToast('请求失败，请检查网络', 'error');
    }
  }

  async function deleteDevice(id, name) {
    if (!confirm(`确定要删除设备「${name}」吗？`)) return;
    try {
      const resp = await fetch(`${API_BASE}/api/devices/${id}`, { method: 'DELETE' });
      const data = await resp.json();
      if (data.success) {
        showToast('设备已删除', 'success');
        loadDevices();
      } else {
        showToast('删除失败', 'error');
      }
    } catch(_) {
      showToast('请求失败', 'error');
    }
  }

  async function toggleStatus(id, currentStatus) {
    const newStatus = currentStatus === 'online' ? 'offline' : 'online';
    try {
      const resp = await fetch(`${API_BASE}/api/devices/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus }),
      });
      const data = await resp.json();
      if (data.success) {
        showToast(`设备状态已更新为${newStatus === 'online' ? '在线' : '离线'}`, 'success');
        loadDevices();
      }
    } catch(_) {
      showToast('操作失败', 'error');
    }
  }

  loadDevices();
</script>
</body>
</html>
